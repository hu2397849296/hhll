<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>胡蕾网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            color: #333;
            font-family: "微软雅黑", sans-serif;
            overflow: hidden;
            height: 100vh;
            cursor: pointer;
        }

        /* 恐怖背景闪烁 */
        @keyframes flicker {
            0% { background: #000; }
            4% { background: #111; }
            6% { background: #000; }
            8% { background: #111; }
            10% { background: #000; }
            60% { background: #000; }
            100% { background: #000; }
        }
        body {
            animation: flicker 3s infinite;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 1;
        }

        .title {
            font-size: 42px;
            color: darkred;
            text-shadow: 0 0 10px red, 0 0 20px darkred;
            margin-bottom: 20px;
            letter-spacing: 3px;
        }

        .phone {
            font-size: 24px;
            color: #999;
            margin-bottom: 50px;
        }

        .tip {
            font-size: 20px;
            color: red;
            text-shadow: 0 0 10px red;
            animation: shake 0.5s infinite alternate;
        }

        @keyframes shake {
            from { transform: translateX(-2px); }
            to { transform: translateX(2px); }
        }

        /* 血手 */
        .hand {
            position: absolute;
            bottom: -200px;
            right: -150px;
            width: 350px;
            height: 500px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 150" fill="%238B0000"><path d="M40,140 C30,120 25,100 30,80 C35,60 45,50 55,50 C65,50 70,65 65,85 C60,105 55,125 50,140 Z"></path></svg>') no-repeat;
            opacity: 0;
            transition: all 1s ease;
            z-index: 999;
        }

        /* 弹出文字 */
        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 60px;
            color: red;
            font-weight: bold;
            text-shadow: 0 0 20px red, 0 0 40px darkred;
            z-index: 1000;
            transition: transform 0.8s ease;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title">胡蕾网站</div>
    <div class="phone">联系电话：52088</div>
    <div class="tip">点击屏幕继续查看...</div>
</div>

<div class="hand" id="bloodyHand"></div>
<div class="popup" id="text">贺迁安拿命来</div>

<script>
    document.body.addEventListener('click', function() {
        // 血手伸出来
        const hand = document.getElementById('bloodyHand');
        hand.style.opacity = '0.9';
        hand.style.bottom = '0';
        hand.style.right = '0';

        // 弹出文字
        const text = document.getElementById('text');
        text.style.transform = 'translate(-50%, -50%) scale(1)';
    });
</script>

</body>
</html>
