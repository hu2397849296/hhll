<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>胡蕾网站</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Creepster&family=UnifrakturCook:wght@700&display=swap');

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #000 url('https://thumbs.dreamstime.com/b/creepy-abandoned-hospital-hallway-blood-splatter-horror-background-unsettling-image-depicts-long-dimly-lit-hospital-396281869.jpg') center/cover no-repeat fixed;
            color: #c00;
            font-family: 'UnifrakturCook', cursive;
            overflow: hidden;
            height: 100vh;
            position: relative;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2220%22 height=%2220%22><circle cx=%2210%22 cy=%2210%22 r=%228%22 fill=%22%23f00%22 opacity=%220.7%22/></svg>') 10 10, auto;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(50,0,0,0.6) 0%, rgba(0,0,0,0.9) 70%);
            pointer-events: none;
            z-index: 0;
            animation: pulse 8s infinite alternate;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            100% { opacity: 0.7; }
        }

        .stage {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 30px;
            z-index: 2;
        }

        .stage.active { display: flex; }

        h1 {
            font-family: 'Creepster', cursive;
            font-size: 6rem;
            text-shadow: 0 0 30px #f00, 0 0 60px #800;
            animation: flicker 1.5s infinite alternate;
            margin-bottom: 20px;
            letter-spacing: 10px;
        }

        p {
            font-size: 2rem;
            max-width: 800px;
            text-shadow: 0 0 20px #f00;
            line-height: 1.7;
            margin-bottom: 50px;
            opacity: 0.9;
        }

        .ghost-figure {
            position: fixed;
            bottom: -30%;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            opacity: 0;
            filter: brightness(0.6) contrast(1.4);
            transition: all 4s ease-in-out;
            z-index: 1;
            pointer-events: none;
        }

        .ghost-figure.show {
            opacity: 0.4;
            bottom: 10%;
            animation: float 12s infinite ease-in-out;
        }

        @keyframes float {
            0%,100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-30px); }
        }

        .next-btn {
            background: rgba(150,0,0,0.7);
            color: #fff;
            border: 5px solid #f00;
            padding: 20px 60px;
            font-size: 2.2rem;
            font-family: 'Creepster', cursive;
            cursor: pointer;
            box-shadow: 0 0 40px #f00;
            transition: all 0.4s;
            text-transform: uppercase;
        }

        .next-btn:hover {
            background: #f00;
            transform: scale(1.15);
            box-shadow: 0 0 70px #f00;
        }

        @keyframes flicker {
            0%,100% { opacity:1; text-shadow:0 0 30px #f00; }
            50% { opacity:0.5; text-shadow:0 0 15px #800; }
        }

        @keyframes shake {
            0% { transform: translate(0); }
            10% { transform: translate(-4px, -6px) rotate(-2deg); }
            20% { transform: translate(4px, 2px) rotate(2deg); }
            /* ... 省略中间，类似之前 */
            100% { transform: translate(0); }
        }

        .scare {
            display: none;
            position: fixed;
            inset: 0;
            background: #200 url('https://media.craiyon.com/2025-10-15/p9Sd1_57TKOXpYtpLri49A.webp') center/contain no-repeat;
            background-color: rgba(100,0,0,0.8);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #f00;
        }

        .scare.active { display: flex; }

        #blood-hand {
            width: 500px;
            position: absolute;
            bottom: -600px;
            left: 50%;
            transform: translateX(-50%);
            filter: drop-shadow(0 0 60px #f00);
            transition: bottom 0.7s cubic-bezier(0.1,0.9,0.2,1);
        }

        #blood-hand.rush { bottom: 15%; animation: shake 0.7s infinite; }

        #scare-text {
            font-size: 9rem;
            text-shadow: 0 0 50px #f00, 0 0 100px #800;
            opacity: 0;
            transform: scale(0.4);
            transition: all 0.5s;
        }

        #scare-text.appear {
            opacity: 1;
            transform: scale(1);
            animation: flicker 0.8s infinite;
        }

        .flash { animation: flash-red 0.3s 3; }

        @keyframes flash-red {
            0%,100% { background: #f00; }
            50% { background: #400; }
        }

        .blood-drip {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: linear-gradient(transparent, rgba(200,0,0,0.3) 10%, transparent);
            animation: drip 6s linear infinite;
        }

        @keyframes drip {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
    </style>
</head>
<body>

    <div class="overlay"></div>
    <div class="blood-drip"></div>

    <img class="ghost-figure" id="ghost" src="https://media.craiyon.com/2025-10-15/p9Sd1_57TKOXpYtpLri49A.webp" alt="胡蕾鬼影">

    <!-- stages -->
    <div id="stage1" class="stage active">
        <h1>胡蕾网站</h1>
        <p>她还在看着你。<br>从屏幕的另一边。<br>长发遮住了半张脸…<br>但那双眼睛，从未闭上。</p>
        <button class="next-btn" onclick="nextStage()">凝视深渊</button>
    </div>

    <div id="stage2" class="stage">
        <h1>胡蕾网站</h1>
        <p>三年前的那个雨夜…<br>她被拖进了走廊尽头。<br>现在，她回来了。<br>带着血，和怨念。</p>
        <button class="next-btn" onclick="nextStage()">继续看</button>
    </div>

    <div id="stage3" class="stage">
        <h1>胡蕾网站</h1>
        <p>贺迁安…<br>他用命换了她的出现。<br>现在轮到你了。<br>拿命来。</p>
        <button class="next-btn" onclick="nextStage()">我准备好了</button>
    </div>

    <div id="stage4" class="stage">
        <h1 style="color:#fff; font-size:7rem; animation:flicker 0.5s infinite;">别回头</h1>
        <p>她已经站在你身后了。<br>闻到你的恐惧了吗？</p>
        <button class="next-btn" onclick="triggerScare()">拿命来换</button>
    </div>

    <!-- 惊吓屏 -->
    <div id="scare" class="scare">
        <img id="blood-hand" src="https://t3.ftcdn.net/jpg/06/70/44/78/360_F_670447881_CHfFRGULFTbfgb2BtGRSrzOgJ8XcmFC9.jpg" alt="血手">
        <div id="scare-text">贺迁安拿命来！！！</div>
    </div>

    <audio id="bgmusic" loop preload="auto">
        <source src="https://cdn.pixabay.com/audio/2022/03/24/audio_5b4d3d3d3d.mp3" type="audio/mpeg">
    </audio>

    <script>
        let currentStage = 1;
        const bgMusic = document.getElementById('bgmusic');
        const ghost = document.getElementById('ghost');
        let musicStarted = false;

        function nextStage() {
            document.getElementById('stage' + currentStage).classList.remove('active');
            currentStage++;
            const next = document.getElementById('stage' + currentStage);
            if (next) next.classList.add('active');

            if (currentStage === 2) ghost.classList.add('show');  // 第二步鬼影出现

            if (!musicStarted) {
                musicStarted = true;
                bgMusic.volume = 0.4;
                bgMusic.play().catch(()=>{});
            }
        }

        function triggerScare() {
            document.querySelectorAll('.stage').forEach(s => s.style.display = 'none');
            ghost.style.opacity = '0.8';
            ghost.style.width = '800px';
            ghost.style.bottom = '0';

            const scare = document.getElementById('scare');
            scare.classList.add('active');

            document.body.classList.add('flash');

            setTimeout(() => {
                document.getElementById('blood-hand').classList.add('rush');
                document.getElementById('scare-text').classList.add('appear');
                document.body.style.animation = 'shake 0.8s 4';
            }, 400);
        }

        // 随机轻微抖动 + 呼吸
        setInterval(() => {
            if (currentStage < 5) {
                document.body.style.transform = `translate(${Math.random()*4-2}px, ${Math.random()*4-2}px)`;
                setTimeout(() => document.body.style.transform = 'translate(0,0)', 200);
            }
        }, 3000);
    </script>
</body>
</html>
