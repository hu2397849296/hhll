<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>胡蕾网站</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Creepster&family=UnifrakturCook:wght@700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0000;
            color: #aa0000;
            font-family: 'UnifrakturCook', cursive;
            overflow: hidden;
            height: 100vh;
            position: relative;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2216%22 height=%2216%22><circle cx=%228%22 cy=%228%22 r=%226%22 fill=%22%23ff0000%22 opacity=%220.8%22/></svg>') 8 8, auto;
        }

        .stage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            background: radial-gradient(circle at center, #220000 0%, #000000 80%);
            z-index: 1;
        }

        .stage.active {
            display: flex;
        }

        h1 {
            font-family: 'Creepster', cursive;
            font-size: 4.5rem;
            text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000, 0 0 60px #aa0000;
            animation: flicker 1.2s infinite alternate;
            margin-bottom: 30px;
            letter-spacing: 8px;
        }

        p {
            font-size: 1.8rem;
            max-width: 700px;
            text-shadow: 0 0 15px #ff0000;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .next-btn {
            background: #aa0000;
            color: #000;
            border: 4px solid #ff0000;
            padding: 15px 40px;
            font-size: 1.8rem;
            font-family: 'Creepster', cursive;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 30px #ff0000;
            text-transform: uppercase;
        }

        .next-btn:hover {
            background: #ff0000;
            color: #fff;
            transform: scale(1.1);
            box-shadow: 0 0 50px #ff0000;
        }

        @keyframes flicker {
            0% { opacity: 1; }
            50% { opacity: 0.4; text-shadow: 0 0 10px #ff0000; }
            100% { opacity: 1; }
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 2px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .scare {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #440000;
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .scare.active {
            display: flex;
        }

        #blood-hand {
            width: 420px;
            position: absolute;
            bottom: -500px;
            left: 50%;
            transform: translateX(-50%);
            filter: drop-shadow(0 0 40px #ff0000);
            transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        #blood-hand.rush {
            bottom: 18%;
            animation: shake 0.8s infinite;
        }

        #scare-text {
            font-family: 'Creepster', cursive;
            font-size: 7rem;
            color: #ff0000;
            text-shadow: 0 0 30px #ff0000, 0 0 80px #ff0000, 0 0 120px #aa0000;
            opacity: 0;
            transform: scale(0.3);
            transition: all 0.4s;
            margin-top: 20px;
        }

        #scare-text.appear {
            opacity: 1;
            transform: scale(1);
        }

        .flash {
            animation: flash-red 0.2s 2;
        }

        @keyframes flash-red {
            0% { background: #ff0000; }
            100% { background: #440000; }
        }

        .warning {
            position: absolute;
            bottom: 20px;
            font-size: 1rem;
            color: #660000;
            animation: flicker 2s infinite;
        }
    </style>
</head>
<body>

    <!-- 第1步：入口 -->
    <div id="stage1" class="stage active">
        <h1>胡蕾网站</h1>
        <p>欢迎来到…<br>这里没有活人能离开。<br>胡蕾在黑暗里等你。<br><br>你真的敢点吗？</p>
        <button class="next-btn" onclick="nextStage()">进入地狱</button>
        <div class="warning">↑ 别后悔 ↑</div>
    </div>

    <!-- 第2步 -->
    <div id="stage2" class="stage">
        <h1>胡蕾网站</h1>
        <p>三年前…<br>胡蕾死在了这里。<br>她的眼睛还在盯着屏幕。<br>你现在就是下一个。</p>
        <button class="next-btn" onclick="nextStage()">继续往下</button>
    </div>

    <!-- 第3步 -->
    <div id="stage3" class="stage">
        <h1>胡蕾网站</h1>
        <p>贺迁安的灵魂在哭喊。<br>他被困在这里。<br>他需要…<br>一条命来换他自己。</p>
        <button class="next-btn" onclick="nextStage()">我明白了</button>
    </div>

    <!-- 第4步：最后警告 -->
    <div id="stage4" class="stage">
        <h1 style="color:#ff0000; animation: flicker 0.6s infinite;">胡蕾网站</h1>
        <p>最后一步。<br>别逃。<br>他已经闻到你的味道了。</p>
        <button class="next-btn" onclick="triggerScare()">拿命来</button>
    </div>

    <!-- 终极惊吓 -->
    <div id="scare" class="scare">
        <img id="blood-hand" src="https://t3.ftcdn.net/jpg/06/70/44/78/360_F_670447881_CHfFRGULFTbfgb2BtGRSrzOgJ8XcmFC9.jpg" alt="血手">
        <div id="scare-text">贺迁安拿命来！！！</div>
    </div>

    <audio id="bgmusic" loop preload="auto">
        <source src="https://cdn.pixabay.com/audio/2022/03/24/audio_5b4d3d3d3d.mp3" type="audio/mpeg">
    </audio>

    <script>
        let currentStage = 1;
        const bgMusic = document.getElementById('bgmusic');
        let musicStarted = false;

        function nextStage() {
            document.getElementById('stage' + currentStage).classList.remove('active');
            currentStage++;
            const next = document.getElementById('stage' + currentStage);
            if (next) {
                next.classList.add('active');
            }

            if (!musicStarted && currentStage >= 2) {
                musicStarted = true;
                bgMusic.volume = 0.5;  // 音量调低一点避免太吵
                bgMusic.play().catch(() => {});
            }
        }

        function triggerScare() {
            document.querySelectorAll('.stage').forEach(s => s.style.display = 'none');

            const scareScreen = document.getElementById('scare');
            scareScreen.classList.add('active');

            document.body.classList.add('flash');
            setTimeout(() => document.body.classList.remove('flash'), 800);

            setTimeout(() => {
                const hand = document.getElementById('blood-hand');
                hand.classList.add('rush');
                
                const text = document.getElementById('scare-text');
                text.classList.add('appear');
                
                document.body.style.animation = 'shake 0.6s 3';
            }, 300);
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === "Escape" && document.getElementById('scare').classList.contains('active')) {
                alert("你以为逃得掉？");
            }
        });

        setInterval(() => {
            if (currentStage < 5) {
                document.body.style.boxShadow = '0 0 80px #660000';
                setTimeout(() => {
                    document.body.style.boxShadow = '0 0 30px #220000';
                }, 400);
            }
        }, 1200);
    </script>
</body>
</html>
