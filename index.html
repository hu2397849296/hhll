<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>胡蕾网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            font-family: "微软雅黑", sans-serif;
            overflow: hidden;
            height: 100vh;
            cursor: pointer;
        }

        @keyframes glitch {
            0%{transform:translate(0)}
            20%{transform:translate(-2px,3px)}
            40%{transform:translate(-3px,-2px)}
            60%{transform:translate(3px,2px)}
            80%{transform:translate(2px,-3px)}
            100%{transform:translate(0)}
        }

        @keyframes flicker {
            0%,19%,21%,23%,25%,54%,56%,100%{background:#000}
            20%,22%,24%,55%{background:#1a0000}
        }

        body {
            animation: flicker 1.5s infinite;
        }

        .scanline {
            position: fixed;
            top:0;left:0;width:100%;height:100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(255,0,0,0.08) 50%);
            background-size:100% 4px;
            pointer-events:none;
            z-index:10;
            opacity:0.4;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index:1;
        }

        .title {
            font-size:48px;
            color:#ff1a1a;
            text-shadow:0 0 12px red,0 0 24px darkred;
            margin-bottom:24px;
            animation:glitch 0.3s infinite;
        }

        .phone {
            font-size:28px;
            color:#aaa;
            margin-bottom:60px;
        }

        .tip {
            font-size:24px;
            color:red;
            text-shadow:0 0 10px red;
            animation:shake 0.4s infinite alternate;
        }

        @keyframes shake {
            from{transform:translateX(-4px)}
            to{transform:translateX(4px)}
        }

        .hand {
            position:fixed;
            bottom:-400px;
            right:-100px;
            width:400px;
            height:600px;
            background:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 150"><path fill="#700000" d="M45,140 C35,115 28,90 35,70 C42,50 52,42 62,42 C72,42 78,60 72,82 C66,104 60,125 55,140 Z"/></svg>');
            background-size:cover;
            opacity:0;
            transition:all 1.1s ease;
            z-index:20;
        }

        .popup {
            position:fixed;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%) scale(0);
            font-size:80px;
            color:red;
            font-weight:bold;
            text-shadow:0 0 25px red,0 0 50px darkred;
            z-index:30;
            transition:transform 0.7s ease;
            animation:glitch 0.2s infinite;
        }
    </style>
</head>

<body>
    <div class="scanline"></div>

    <!-- 恐怖背景音乐 -->
    <audio id="horrorAudio" loop preload="auto">
        <source src="https://cdn.jsdelivr.net/gh/volantis-x/cdn-media/audios/horror-background.mp3" type="audio/mpeg">
    

    <div class="container">
        <div class="title">胡蕾网站</div>
        <div class="phone">联系电话：52088</div>
        <div class="tip">点击屏幕查看隐藏内容</div>
    </div>

    <div class="hand" id="bloodyHand"></div>
    <div class="popup" id="msg">贺迁安拿命来</div>

    <script>
        const audio = document.getElementById('horrorAudio');
        audio.volume = 0.6;

        document.body.onclick = function() {
            // 播放恐怖音乐
            audio.play().catch(err => {});

            // 血手爬出
            document.getElementById('bloodyHand').style.cssText = 'opacity:1;bottom:0;right:0';
            // 弹出文字
            document.getElementById('msg').style.cssText = 'transform:translate(-50%,-50%) scale(1)';
        };
    </script>
</body>
</html>
